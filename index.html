<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSales Support — Демо виджета</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── Шапка ── */
  .header {
    background: #065A82;
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-logo {
    width: 36px; height: 36px;
    background: #1C7293;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header p  { font-size: 13px; opacity: .75; margin-top: 2px; }
  .badge {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 4px 10px; border-radius: 20px; font-size: 12px;
  }

  /* ── Макет ── */
  .demo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1100px;
    margin: 28px auto;
    padding: 0 20px;
  }
  @media (max-width: 760px) { .demo-grid { grid-template-columns: 1fr; } }

  .panel {
    background: white;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex; flex-direction: column;
    overflow: hidden; height: 600px;
  }

  .panel-header {
    padding: 14px 18px;
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #eee;
  }
  .panel-header .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ccc;
  }
  .panel-header .dot.online { background: #27ae60; }

  .panel-label {
    font-size: 11px; font-weight: 500; letter-spacing: .5px;
    text-transform: uppercase; opacity: .5; margin-left: auto;
  }

  /* ── Чат ── */
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }

  .msg {
    max-width: 82%; padding: 10px 14px;
    border-radius: 12px; font-size: 14px; line-height: 1.5;
    word-break: break-word; white-space: pre-wrap;
  }
  .msg.bot {
    background: #f0f4f8; color: #1a1a2e;
    border-bottom-left-radius: 4px; align-self: flex-start;
  }
  .msg.user {
    background: #065A82; color: white;
    border-bottom-right-radius: 4px; align-self: flex-end;
  }
  .msg.support {
    background: #e8f8ef; color: #1a2e1a;
    border: 1px solid #b8e6cc;
    border-bottom-left-radius: 4px; align-self: flex-start;
  }
  .msg.system {
    background: #fff8e6; color: #7a5c00;
    font-size: 12px; padding: 7px 12px;
    border-radius: 8px; align-self: center;
    text-align: center; max-width: 90%;
  }
  .msg-time { font-size: 11px; opacity: .5; margin-top: 4px; }
  .msg-role { font-size: 11px; font-weight: 600; opacity: .6; margin-bottom: 2px; }

  /* Кнопки фидбека */
  .feedback-btns {
    display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap;
  }
  .feedback-btn {
    padding: 6px 14px; border-radius: 8px;
    border: 1px solid; cursor: pointer;
    font-size: 13px; font-weight: 500;
    transition: all .15s;
  }
  .feedback-btn.yes { border-color: #27ae60; color: #27ae60; background: #f0faf4; }
  .feedback-btn.yes:hover { background: #27ae60; color: white; }
  .feedback-btn.no  { border-color: #e74c3c; color: #e74c3c; background: #fff5f5; }
  .feedback-btn.no:hover  { background: #e74c3c; color: white; }

  /* ── Поле ввода ── */
  .chat-input-area {
    padding: 12px 16px;
    border-top: 1px solid #eee;
    display: flex; gap: 8px; align-items: flex-end;
  }
  .chat-input {
    flex: 1; border: 1px solid #dde3ea; border-radius: 10px;
    padding: 10px 14px; font-size: 14px; resize: none;
    font-family: inherit; outline: none; max-height: 100px;
    transition: border-color .15s;
  }
  .chat-input:focus { border-color: #065A82; }
  .send-btn {
    background: #065A82; color: white;
    border: none; border-radius: 10px;
    padding: 10px 16px; cursor: pointer;
    font-size: 14px; font-weight: 600;
    transition: background .15s; white-space: nowrap;
  }
  .send-btn:hover { background: #1C7293; }
  .send-btn:disabled { background: #aaa; cursor: not-allowed; }

  /* ── Панель поддержки — список тикетов ── */
  .support-login {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    padding: 24px;
  }
  .support-login p { font-size: 14px; color: #666; text-align: center; }
  .login-input {
    width: 100%; border: 1px solid #dde3ea; border-radius: 10px;
    padding: 10px 14px; font-size: 14px; outline: none;
  }
  .login-input:focus { border-color: #065A82; }
  .login-btn {
    width: 100%; background: #065A82; color: white;
    border: none; border-radius: 10px; padding: 11px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .login-error { color: #e74c3c; font-size: 13px; }

  .support-panel {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .tickets-sidebar {
    border-bottom: 1px solid #eee;
    max-height: 180px; overflow-y: auto; padding: 10px;
  }
  .ticket-item {
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    font-size: 13px; transition: background .1s;
    border: 1px solid transparent;
  }
  .ticket-item:hover { background: #f5f7fa; }
  .ticket-item.active { background: #e8f0fe; border-color: #065A82; }
  .ticket-id { font-weight: 600; font-size: 12px; color: #065A82; }
  .ticket-preview { color: #666; font-size: 12px; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ticket-badge {
    display: inline-block; background: #e74c3c; color: white;
    border-radius: 10px; padding: 1px 7px; font-size: 11px;
    margin-left: 6px; vertical-align: middle;
  }
  .no-tickets {
    text-align: center; color: #aaa; font-size: 13px;
    padding: 20px; font-style: italic;
  }

  /* Чат поддержки */
  .support-chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .support-chat-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #aaa; font-size: 14px; font-style: italic;
  }

  .typing { color: #aaa; font-size: 13px; font-style: italic; padding: 4px 16px; }

  /* Источник ответа */
  .source-badge {
    display: inline-block; font-size: 11px; padding: 2px 8px;
    border-radius: 10px; margin-top: 4px;
  }
  .source-badge.keyword { background: #e8f8ef; color: #27ae60; }
  .source-badge.ai      { background: #e8f0fe; color: #065A82; }

  .close-btn {
    background: #27ae60; color: white; border: none;
    border-radius: 8px; padding: 6px 14px; font-size: 13px;
    cursor: pointer; margin-top: 8px;
  }
  .close-btn:hover { background: #219a52; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">iS</div>
  <div>
    <h1>iSales Support</h1>
    <p>Демо-страница виджета поддержки</p>
  </div>
  <span class="badge">Demo</span>
</div>

<div class="demo-grid">

  <!-- ══ ВИДЖЕТ ПОЛЬЗОВАТЕЛЯ ══ -->
  <div class="panel" id="userPanel">
    <div class="panel-header">
      <div class="dot online" id="userDot"></div>
      <span>Чат с поддержкой</span>
      <span class="panel-label">Пользователь</span>
    </div>
    <div class="chat-messages" id="userMessages"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="userInput"
        placeholder="Напишите вопрос..." rows="1"
        onkeydown="handleUserKey(event)"></textarea>
      <button class="send-btn" id="userSendBtn" onclick="sendUserMessage()">
        Отправить
      </button>
    </div>
  </div>

  <!-- ══ ВИДЖЕТ ПОДДЕРЖКИ ══ -->
  <div class="panel" id="supportPanel">
    <div class="panel-header">
      <div class="dot" id="supportDot"></div>
      <span>Панель поддержки</span>
      <span class="panel-label">Специалист</span>
    </div>

    <!-- Форма входа -->
    <div class="support-login" id="supportLogin">
      <p>Войдите как специалист поддержки</p>
      <input class="login-input" type="password" id="supportPassword"
        placeholder="Пароль" onkeydown="if(event.key==='Enter')supportLogin()">
      <button class="login-btn" onclick="supportLogin()">Войти</button>
      <span class="login-error" id="loginError"></span>
    </div>

    <!-- Панель после входа -->
    <div class="support-panel" id="supportMain" style="display:none">
      <div class="tickets-sidebar" id="ticketsList">
        <div class="no-tickets" id="noTickets">Нет открытых тикетов</div>
      </div>
      <div class="support-chat" id="supportChat">
        <div class="support-chat-empty" id="supportChatEmpty">
          Выберите тикет для ответа
        </div>
        <div class="chat-messages" id="supportMessages" style="display:none"></div>
        <div class="chat-input-area" id="supportInputArea" style="display:none">
          <button class="close-btn" onclick="closeCurrentTicket()">Закрыть тикет</button>
          <textarea class="chat-input" id="supportInput"
            placeholder="Ответ пользователю..." rows="1"
            onkeydown="handleSupportKey(event)"></textarea>
          <button class="send-btn" onclick="sendSupportReply()">Ответить</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════════════
// КОНФИГ — замените URL на ваш Railway
// ══════════════════════════════════════════════════════════════
const API     = (window.BACKEND_URL || 'https://isales-bot-production.up.railway.app/').replace(/\/$/, '');
const WS_BASE = API.replace(/^https/, 'wss').replace(/^http/, 'ws');

// ══════════════════════════════════════════════════════════════
// ГЛОБАЛЬНОЕ СОСТОЯНИЕ
// ══════════════════════════════════════════════════════════════
let userSessionId = null;
let userWs        = null;
let supportWs     = null;
let activeTicketId = null;          // tid открытого тикета в панели поддержки
const tickets = {};                  // { tid: { ticket_id, session_id, user_name, questions, messages[] } }

// ══════════════════════════════════════════════════════════════
// УТИЛИТЫ
// ══════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const esc = t => String(t ?? '')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const timeNow = () =>
  new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
const scroll = el => { el.scrollTop = el.scrollHeight; };

// ══════════════════════════════════════════════════════════════
// ВИДЖЕТ ПОЛЬЗОВАТЕЛЯ
// ══════════════════════════════════════════════════════════════

async function initUser() {
  try {
    const r = await fetch(API + '/widget/session', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user_name: 'Пользователь'})
    });
    const d = await r.json();
    userSessionId = d.session_id;
    userAppend('bot', d.greeting);
    connectUserWs();
  } catch(e) {
    userAppend('system', 'Не удалось подключиться к серверу. Проверьте URL в конфиге.');
    console.error('initUser error:', e);
  }
}

function connectUserWs() {
  if (!userSessionId) return;
  try {
    userWs = new WebSocket(WS_BASE + '/ws/user/' + userSessionId);
    userWs.onopen    = () => console.log('User WS connected');
    userWs.onclose   = () => setTimeout(connectUserWs, 3000);
    userWs.onerror   = e => console.warn('User WS error', e);
    userWs.onmessage = e => {
      try {
        const ev = JSON.parse(e.data);
        console.log('User WS event:', ev);
        if (ev.type === 'support_reply') {
          userAppend('support', ev.text, ev.time);
          showFeedback(ev.ticket_id);
        } else if (ev.type === 'ticket_closed') {
          userAppend('system', ev.text || 'Тикет закрыт специалистом.');
        }
      } catch(err) { console.error('User WS parse error', err); }
    };
  } catch(e) {
    console.error('connectUserWs error:', e);
    setTimeout(connectUserWs, 5000);
  }
}

function userAppend(role, text, time) {
  const box = $('userMessages');
  const d   = document.createElement('div');
  d.className = 'msg ' + role;
  const roleLabel = role === 'support'
    ? '<div class="msg-role">Специалист поддержки</div>' : '';
  d.innerHTML = roleLabel
    + esc(text).replace(/\n/g, '<br>')
    + '<div class="msg-time">' + (time || timeNow()) + '</div>';
  box.appendChild(d);
  scroll(box);
  return d;
}

function showFeedback(ticketId) {
  const box = $('userMessages');
  const d   = document.createElement('div');
  d.className = 'msg bot';
  d.id = 'fb_' + ticketId;
  d.innerHTML = 'Помогло?'
    + '<div class="feedback-btns">'
    + '<button class="feedback-btn yes" onclick="sendFeedback(\''+ticketId+'\',true)">✅ Да, решено</button>'
    + '<button class="feedback-btn no"  onclick="sendFeedback(\''+ticketId+'\',false)">❌ Не помогло</button>'
    + '</div>';
  box.appendChild(d);
  scroll(box);
}

async function sendFeedback(ticketId, resolved) {
  const fb = $('fb_' + ticketId);
  if (fb) fb.remove();
  try {
    const r = await fetch(API + '/widget/feedback', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: userSessionId, ticket_id: ticketId, resolved})
    });
    const d = await r.json();
    userAppend('bot', d.reply);
  } catch(e) {
    userAppend('system', 'Ошибка отправки отзыва.');
  }
}

async function sendUserMessage() {
  const inp = $('userInput');
  const btn = $('userSendBtn');
  const text = inp.value.trim();
  if (!text || !userSessionId) return;

  inp.value = '';
  inp.style.height = 'auto';
  userAppend('user', text);
  btn.disabled = true;

  try {
    const r = await fetch(API + '/widget/message', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: userSessionId, message: text, user_name: 'Пользователь'})
    });
    if (!r.ok) {
      userAppend('system', 'Ошибка сервера: ' + r.status);
      return;
    }
    const d = await r.json();
    userAppend('bot', d.reply);
    if (d.source) {
      const msgs = $('userMessages');
      const last = msgs.lastElementChild;
      if (last) {
        const badge = document.createElement('div');
        badge.className = 'source-badge ' + d.source;
        badge.textContent = d.source === 'ai' ? 'AI' : 'База знаний';
        last.appendChild(badge);
      }
    }
    if (d.show_feedback && d.ticket_id) {
      showFeedback(d.ticket_id);
    }
  } catch(e) {
    userAppend('system', 'Нет соединения. Попробуйте ещё раз.');
    console.error('sendUserMessage error:', e);
  } finally {
    btn.disabled = false;
    inp.focus();
  }
}

function handleUserKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendUserMessage();
  }
  setTimeout(() => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 100) + 'px';
  }, 0);
}

// ══════════════════════════════════════════════════════════════
// ПАНЕЛЬ ПОДДЕРЖКИ — ВХОД
// ══════════════════════════════════════════════════════════════

async function supportLogin() {
  const pwd = $('supportPassword').value.trim();
  const err = $('loginError');
  err.textContent = '';
  if (!pwd) { err.textContent = 'Введите пароль'; return; }

  try {
    const r = await fetch(API + '/support/auth', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pwd})
    });
    if (r.ok) {
      $('supportLogin').style.display = 'none';
      showSupportMain();
    } else {
      const d = await r.json().catch(() => ({}));
      err.textContent = d.error || 'Неверный пароль';
    }
  } catch(e) {
    err.textContent = 'Ошибка соединения с сервером';
    console.error('supportLogin error:', e);
  }
}

function showSupportMain() {
  const main = $('supportMain');
  main.style.display       = 'flex';
  main.style.flexDirection = 'column';
  main.style.flex          = '1';
  main.style.overflow      = 'hidden';
  $('supportDot').classList.add('online');
  connectSupportWs();
  loadAllTickets();
}

// ══════════════════════════════════════════════════════════════
// ПАНЕЛЬ ПОДДЕРЖКИ — WEBSOCKET
// ══════════════════════════════════════════════════════════════

function connectSupportWs() {
  try {
    supportWs = new WebSocket(WS_BASE + '/ws/support');
    supportWs.onopen  = () => console.log('Support WS connected');
    supportWs.onclose = () => setTimeout(connectSupportWs, 3000);
    supportWs.onerror = e => console.warn('Support WS error', e);
    supportWs.onmessage = e => {
      try {
        const ev = JSON.parse(e.data);
        console.log('Support WS event:', ev.type, ev);
        if (ev.type === 'init') {
          (ev.tickets || []).forEach(saveTicket);
          renderTicketList();
        } else if (ev.type === 'new_ticket') {
          saveTicket(ev);
          renderTicketList();
        } else if (ev.type === 'user_message') {
          // Новое сообщение от пользователя в активный тикет
          const tid = findTicketBySid(ev.session_id);
          if (tid) {
            tickets[tid].messages = tickets[tid].messages || [];
            tickets[tid].messages.push({role:'user', text: ev.text, time: ev.time || timeNow()});
            if (activeTicketId === tid) {
              supportAppend('user', ev.text, ev.time, tickets[tid].user_name);
            }
          }
        }
      } catch(err) { console.error('Support WS parse:', err); }
    };
  } catch(e) {
    console.error('connectSupportWs error:', e);
    setTimeout(connectSupportWs, 5000);
  }
}

// ══════════════════════════════════════════════════════════════
// ПАНЕЛЬ ПОДДЕРЖКИ — ТИКЕТЫ
// ══════════════════════════════════════════════════════════════

function saveTicket(t) {
  if (!t || !t.ticket_id) return;
  const tid = t.ticket_id;
  // Нормализуем историю (бэкенд может отдавать chat_history или messages)
  const history = t.messages || t.chat_history || [];
  tickets[tid] = {
    ticket_id:  tid,
    session_id: t.session_id,
    user_name:  t.user_name || 'Пользователь',
    questions:  t.questions || [],
    state:      t.state || 'open',
    created_at: t.created_at || '',
    messages:   history,
  };
  console.log('Ticket saved:', tid, tickets[tid]);
}

function findTicketBySid(sessionId) {
  return Object.keys(tickets).find(k => tickets[k].session_id === sessionId) || null;
}

async function loadAllTickets() {
  try {
    const r = await fetch(API + '/support/tickets');
    if (!r.ok) return;
    const d = await r.json();
    (d.tickets || []).forEach(saveTicket);
    renderTicketList();
    console.log('Tickets loaded:', Object.keys(tickets).length);
  } catch(e) {
    console.error('loadAllTickets error:', e);
  }
}

function renderTicketList() {
  const el   = $('ticketsList');
  const keys = Object.keys(tickets);
  el.innerHTML = '';

  if (!keys.length) {
    el.innerHTML = '<div class="no-tickets">Нет открытых тикетов</div>';
    return;
  }

  keys.forEach(tid => {
    const t   = tickets[tid];
    const div = document.createElement('div');
    div.className = 'ticket-item' + (activeTicketId === tid ? ' active' : '');

    // ВАЖНО: onclick назначаем через addEventListener, не через innerHTML
    div.addEventListener('click', () => openTicket(tid));

    const lastQ = (t.questions || []).slice(-1)[0] || '—';
    div.innerHTML =
      '<div class="ticket-id">' + esc(tid)
      + '<span class="ticket-badge">' + esc(t.state) + '</span></div>'
      + '<div class="ticket-preview">' + esc(t.user_name) + ': ' + esc(lastQ) + '</div>';
    el.appendChild(div);
  });
}

function openTicket(tid) {
  console.log('openTicket called:', tid, tickets[tid]);
  const t = tickets[tid];
  if (!t) { console.error('Ticket not found:', tid); return; }

  activeTicketId = tid;
  renderTicketList(); // перерисует с active-классом

  // Показываем чат
  $('supportChatEmpty').style.display  = 'none';
  $('supportMessages').style.display   = 'flex';
  $('supportInputArea').style.display  = 'flex';

  // Рисуем историю
  const msgs = $('supportMessages');
  msgs.innerHTML = '';

  const history = t.messages || [];
  if (history.length === 0) {
    // Нет истории — показываем вопросы из questions
    (t.questions || []).forEach(q => {
      supportAppend('user', q, '', t.user_name, false);
    });
    if (!t.questions || !t.questions.length) {
      const tip = document.createElement('div');
      tip.className = 'msg system';
      tip.textContent = 'История переписки недоступна. Ответьте пользователю ниже.';
      msgs.appendChild(tip);
    }
  } else {
    history.forEach(m => supportAppend(m.role, m.text, m.time, t.user_name, false));
  }
  scroll(msgs);
  $('supportInput').focus();
}

function supportAppend(role, text, time, userName, doScroll) {
  if (doScroll === undefined) doScroll = true;
  const msgs = $('supportMessages');
  if (!msgs) return;
  const d = document.createElement('div');
  // user → выглядит как "бот" (чужое сообщение слева)
  // support → выглядит как "наше" сообщение справа
  d.className = 'msg ' + (role === 'support' ? 'user' : role === 'user' ? 'bot' : 'system');
  const label = role === 'user'
    ? '<div class="msg-role">' + esc(userName || 'Пользователь') + '</div>'
    : role === 'support'
      ? '<div class="msg-role">Вы</div>'
      : '';
  d.innerHTML = label
    + esc(text).replace(/\n/g, '<br>')
    + '<div class="msg-time">' + (time || timeNow()) + '</div>';
  msgs.appendChild(d);
  if (doScroll) scroll(msgs);
}

async function sendSupportReply() {
  const inp  = $('supportInput');
  const text = inp.value.trim();
  if (!text) return;
  if (!activeTicketId) { alert('Выберите тикет'); return; }

  const t = tickets[activeTicketId];
  if (!t) { console.error('No active ticket'); return; }

  inp.value = '';
  supportAppend('support', text, timeNow(), '', true);

  try {
    const r = await fetch(API + '/support/reply', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        ticket_id:  activeTicketId,
        session_id: t.session_id,
        message:    text,
      })
    });
    if (!r.ok) {
      console.error('reply error:', r.status, await r.text());
      supportAppend('system', 'Ошибка отправки: ' + r.status);
      return;
    }
    // Сохраняем в локальную историю
    t.messages = t.messages || [];
    t.messages.push({role: 'support', text, time: timeNow()});
    console.log('Reply sent OK');
  } catch(e) {
    supportAppend('system', 'Нет соединения с сервером.');
    console.error('sendSupportReply error:', e);
  }
}

function handleSupportKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendSupportReply();
  }
  setTimeout(() => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 100) + 'px';
  }, 0);
}

async function closeCurrentTicket() {
  if (!activeTicketId) return;
  const tid = activeTicketId;
  try {
    await fetch(API + '/support/close/' + tid, {method: 'POST'});
    delete tickets[tid];
    activeTicketId = null;
    renderTicketList();
    $('supportChatEmpty').style.display  = 'flex';
    $('supportMessages').style.display   = 'none';
    $('supportInputArea').style.display  = 'none';
    $('supportMessages').innerHTML = '';
  } catch(e) {
    console.error('closeCurrentTicket error:', e);
  }
}

  if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  initUser();
});
</script>
