<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSales Support — Демо виджета</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── Шапка ── */
  .header {
    background: #065A82;
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-logo {
    width: 36px; height: 36px;
    background: #1C7293;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header p  { font-size: 13px; opacity: .75; margin-top: 2px; }
  .badge {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 4px 10px; border-radius: 20px; font-size: 12px;
  }

  /* ── Макет ── */
  .demo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1100px;
    margin: 28px auto;
    padding: 0 20px;
  }
  @media (max-width: 760px) { .demo-grid { grid-template-columns: 1fr; } }

  .panel {
    background: white;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex; flex-direction: column;
    overflow: hidden; height: 600px;
  }

  .panel-header {
    padding: 14px 18px;
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #eee;
  }
  .panel-header .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ccc;
  }
  .panel-header .dot.online { background: #27ae60; }

  .panel-label {
    font-size: 11px; font-weight: 500; letter-spacing: .5px;
    text-transform: uppercase; opacity: .5; margin-left: auto;
  }

  /* ── Чат ── */
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }

  .msg {
    max-width: 82%; padding: 10px 14px;
    border-radius: 12px; font-size: 14px; line-height: 1.5;
    word-break: break-word; white-space: pre-wrap;
  }
  .msg.bot {
    background: #f0f4f8; color: #1a1a2e;
    border-bottom-left-radius: 4px; align-self: flex-start;
  }
  .msg.user {
    background: #065A82; color: white;
    border-bottom-right-radius: 4px; align-self: flex-end;
  }
  .msg.support {
    background: #e8f8ef; color: #1a2e1a;
    border: 1px solid #b8e6cc;
    border-bottom-left-radius: 4px; align-self: flex-start;
  }
  .msg.system {
    background: #fff8e6; color: #7a5c00;
    font-size: 12px; padding: 7px 12px;
    border-radius: 8px; align-self: center;
    text-align: center; max-width: 90%;
  }
  .msg-time { font-size: 11px; opacity: .5; margin-top: 4px; }
  .msg-role { font-size: 11px; font-weight: 600; opacity: .6; margin-bottom: 2px; }

  /* Кнопки фидбека */
  .feedback-btns {
    display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap;
  }
  .feedback-btn {
    padding: 6px 14px; border-radius: 8px;
    border: 1px solid; cursor: pointer;
    font-size: 13px; font-weight: 500;
    transition: all .15s;
  }
  .feedback-btn.yes { border-color: #27ae60; color: #27ae60; background: #f0faf4; }
  .feedback-btn.yes:hover { background: #27ae60; color: white; }
  .feedback-btn.no  { border-color: #e74c3c; color: #e74c3c; background: #fff5f5; }
  .feedback-btn.no:hover  { background: #e74c3c; color: white; }

  /* ── Поле ввода ── */
  .chat-input-area {
    padding: 12px 16px;
    border-top: 1px solid #eee;
    display: flex; gap: 8px; align-items: flex-end;
  }
  .chat-input {
    flex: 1; border: 1px solid #dde3ea; border-radius: 10px;
    padding: 10px 14px; font-size: 14px; resize: none;
    font-family: inherit; outline: none; max-height: 100px;
    transition: border-color .15s;
  }
  .chat-input:focus { border-color: #065A82; }
  .send-btn {
    background: #065A82; color: white;
    border: none; border-radius: 10px;
    padding: 10px 16px; cursor: pointer;
    font-size: 14px; font-weight: 600;
    transition: background .15s; white-space: nowrap;
  }
  .send-btn:hover { background: #1C7293; }
  .send-btn:disabled { background: #aaa; cursor: not-allowed; }

  /* ── Панель поддержки — список тикетов ── */
  .support-login {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    padding: 24px;
  }
  .support-login p { font-size: 14px; color: #666; text-align: center; }
  .login-input {
    width: 100%; border: 1px solid #dde3ea; border-radius: 10px;
    padding: 10px 14px; font-size: 14px; outline: none;
  }
  .login-input:focus { border-color: #065A82; }
  .login-btn {
    width: 100%; background: #065A82; color: white;
    border: none; border-radius: 10px; padding: 11px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .login-error { color: #e74c3c; font-size: 13px; }

  .support-panel {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .tickets-sidebar {
    border-bottom: 1px solid #eee;
    max-height: 180px; overflow-y: auto; padding: 10px;
  }
  .ticket-item {
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    font-size: 13px; transition: background .1s;
    border: 1px solid transparent;
  }
  .ticket-item:hover { background: #f5f7fa; }
  .ticket-item.active { background: #e8f0fe; border-color: #065A82; }
  .ticket-id { font-weight: 600; font-size: 12px; color: #065A82; }
  .ticket-preview { color: #666; font-size: 12px; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ticket-badge {
    display: inline-block; background: #e74c3c; color: white;
    border-radius: 10px; padding: 1px 7px; font-size: 11px;
    margin-left: 6px; vertical-align: middle;
  }
  .no-tickets {
    text-align: center; color: #aaa; font-size: 13px;
    padding: 20px; font-style: italic;
  }

  /* Чат поддержки */
  .support-chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .support-chat-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #aaa; font-size: 14px; font-style: italic;
  }

  .typing { color: #aaa; font-size: 13px; font-style: italic; padding: 4px 16px; }

  /* Источник ответа */
  .source-badge {
    display: inline-block; font-size: 11px; padding: 2px 8px;
    border-radius: 10px; margin-top: 4px;
  }
  .source-badge.keyword { background: #e8f8ef; color: #27ae60; }
  .source-badge.ai      { background: #e8f0fe; color: #065A82; }

  .close-btn {
    background: #27ae60; color: white; border: none;
    border-radius: 8px; padding: 6px 14px; font-size: 13px;
    cursor: pointer; margin-top: 8px;
  }
  .close-btn:hover { background: #219a52; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">iS</div>
  <div>
    <h1>iSales Support</h1>
    <p>Демо-страница виджета поддержки</p>
  </div>
  <span class="badge">Demo</span>
</div>

<div class="demo-grid">

  <!-- ══ ВИДЖЕТ ПОЛЬЗОВАТЕЛЯ ══ -->
  <div class="panel" id="userPanel">
    <div class="panel-header">
      <div class="dot online" id="userDot"></div>
      <span>Чат с поддержкой</span>
      <span class="panel-label">Пользователь</span>
    </div>
    <div class="chat-messages" id="userMessages"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="userInput"
        placeholder="Напишите вопрос..." rows="1"
        onkeydown="handleUserKey(event)"></textarea>
      <button class="send-btn" id="userSendBtn" onclick="sendUserMessage()">
        Отправить
      </button>
    </div>
  </div>

  <!-- ══ ВИДЖЕТ ПОДДЕРЖКИ ══ -->
  <div class="panel" id="supportPanel">
    <div class="panel-header">
      <div class="dot" id="supportDot"></div>
      <span>Панель поддержки</span>
      <span class="panel-label">Специалист</span>
    </div>

    <!-- Форма входа -->
    <div class="support-login" id="supportLogin">
      <p>Войдите как специалист поддержки</p>
      <input class="login-input" type="password" id="supportPassword"
        placeholder="Пароль" onkeydown="if(event.key==='Enter')supportLogin()">
      <button class="login-btn" onclick="supportLogin()">Войти</button>
      <span class="login-error" id="loginError"></span>
    </div>

    <!-- Панель после входа -->
    <div class="support-panel" id="supportMain" style="display:none;flex-direction:column">
      <div class="tickets-sidebar" id="ticketsList">
        <div class="no-tickets" id="noTickets">Нет открытых тикетов</div>
      </div>
      <div class="support-chat" id="supportChat">
        <div class="support-chat-empty" id="supportChatEmpty">
          Выберите тикет для ответа
        </div>
        <div class="chat-messages" id="supportMessages" style="display:none"></div>
        <div class="chat-input-area" id="supportInputArea" style="display:none">
          <button class="close-btn" onclick="closeCurrentTicket()">Закрыть тикет</button>
          <textarea class="chat-input" id="supportInput"
            placeholder="Ответ пользователю..." rows="1"
            onkeydown="handleSupportKey(event)"></textarea>
          <button class="send-btn" onclick="sendSupportReply()">Ответить</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ── Конфиг ────────────────────────────────────────────────────
// ЗАМЕНИТЕ на URL вашего Railway-проекта:
const API = (window.BACKEND_URL || 'https://YOUR-RAILWAY-URL.up.railway.app').replace(/\/$/, '');
const WS_BASE = API.replace(/^https/, 'wss').replace(/^http/, 'ws');

// ── Состояние ─────────────────────────────────────────────────
let userSessionId  = null;
let userWs         = null;
let supportWs      = null;
let currentTicket  = null;  // { ticket_id, session_id }
let tickets        = {};    // { ticket_id: { session_id, messages[], ... } }
let pendingFeedback = null; // { ticket_id } — ждём фидбек

// ── Утилиты ───────────────────────────────────────────────────
function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollBottom(el) {
  el.scrollTop = el.scrollHeight;
}

function now() {
  return new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
}

// ── ПОЛЬЗОВАТЕЛЬСКИЙ ВИДЖЕТ ───────────────────────────────────

async function initUserWidget() {
  const res = await fetch(`${API}/widget/session`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({user_name: 'Пользователь'})
  });
  const data = await res.json();
  userSessionId = data.session_id;

  addUserMsg('bot', data.greeting);
  connectUserWs();
}

function connectUserWs() {
  userWs = new WebSocket(`${WS_BASE}/ws/user/${userSessionId}`);
  userWs.onmessage = e => {
    const ev = JSON.parse(e.data);
    if (ev.type === 'support_reply') {
      addUserMsg('support', ev.text, ev.time);
      addUserMsg('bot', '💬 Специалист ответил. Помогло?');
      addFeedback(ev.ticket_id);
    } else if (ev.type === 'ticket_closed') {
      addUserMsg('system', ev.text);
    }
  };
  userWs.onclose = () => setTimeout(connectUserWs, 3000);
}

function addUserMsg(role, text, time) {
  const el = document.getElementById('userMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const roleLabel = role === 'support' ? '<div class="msg-role">Специалист поддержки</div>' : '';
  div.innerHTML = `${roleLabel}${esc(text).replace(/\n/g,'<br>')}
    <div class="msg-time">${time || now()}</div>`;
  el.appendChild(div);
  scrollBottom(el);
}

function addFeedback(ticketId) {
  const el = document.getElementById('userMessages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = `feedback-${ticketId}`;
  div.innerHTML = `Помогло?
    <div class="feedback-btns">
      <button class="feedback-btn yes" onclick="sendFeedback('${ticketId}',true)">✅ Да, решено</button>
      <button class="feedback-btn no"  onclick="sendFeedback('${ticketId}',false)">❌ Не помогло</button>
    </div>`;
  el.appendChild(div);
  scrollBottom(el);
}

async function sendFeedback(ticketId, resolved) {
  const fb = document.getElementById(`feedback-${ticketId}`);
  if (fb) fb.remove();
  const res = await fetch(`${API}/widget/feedback`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({session_id: userSessionId, ticket_id: ticketId, resolved})
  });
  const data = await res.json();
  addUserMsg('bot', data.reply);
}

async function sendUserMessage() {
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text || !userSessionId) return;

  input.value = '';
  input.style.height = 'auto';
  addUserMsg('user', text);

  const btn = document.getElementById('userSendBtn');
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/widget/message`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({session_id: userSessionId, message: text, user_name: 'Пользователь'})
    });
    const data = await res.json();

    addUserMsg('bot', data.reply);

    if (data.source) {
      const el = document.getElementById('userMessages');
      const last = el.lastElementChild;
      const badge = document.createElement('div');
      badge.className = `source-badge ${data.source}`;
      badge.textContent = data.source === 'ai' ? 'AI' : 'База знаний';
      last.appendChild(badge);
    }

    if (data.show_feedback && data.ticket_id) {
      addFeedback(data.ticket_id);
    }
  } catch(e) {
    addUserMsg('system', 'Ошибка соединения. Попробуйте ещё раз.');
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

function handleUserKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendUserMessage();
  }
  // Авто-resize textarea
  setTimeout(() => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 100) + 'px';
  }, 0);
}

// ── ПАНЕЛЬ ПОДДЕРЖКИ ──────────────────────────────────────────

async function supportLogin() {
  const pwd = document.getElementById('supportPassword').value;
  const err = document.getElementById('loginError');
  err.textContent = '';
  try {
    const res = await fetch(`${API}/support/auth`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pwd})
    });
    if (res.ok) {
      document.getElementById('supportLogin').style.display = 'none';
      document.getElementById('supportMain').style.display  = 'flex';
      document.getElementById('supportMain').style.flexDirection = 'column';
      document.getElementById('supportDot').classList.add('online');
      connectSupportWs();
      loadTickets();
    } else {
      err.textContent = 'Неверный пароль';
    }
  } catch(e) {
    err.textContent = 'Ошибка соединения';
  }
}

function connectSupportWs() {
  supportWs = new WebSocket(`${WS_BASE}/ws/support`);
  supportWs.onmessage = e => {
    const ev = JSON.parse(e.data);
    if (ev.type === 'init') {
      ev.tickets.forEach(t => registerTicket(t));
    } else if (ev.type === 'new_ticket') {
      registerTicket(ev);
      showSupportNotification(ev);
    } else if (ev.type === 'user_message') {
      appendToTicket(ev.session_id, 'user', ev.text, ev.time);
    }
  };
  supportWs.onclose = () => setTimeout(connectSupportWs, 3000);
}

async function loadTickets() {
  try {
    const res  = await fetch(`${API}/support/tickets`);
    const data = await res.json();
    data.tickets.forEach(t => registerTicket(t));
  } catch(e) { console.error(e); }
}

function registerTicket(t) {
  const tid = t.ticket_id;
  if (!tid) return;
  // Нормализуем: бэкенд может отдавать chat_history или messages
  if (t.chat_history && !t.messages) t.messages = t.chat_history;
  if (!t.messages) t.messages = [];
  // Если тикет уже есть — мержим сообщения, не затираем
  if (tickets[tid]) {
    tickets[tid] = { ...tickets[tid], ...t };
  } else {
    tickets[tid] = t;
  }
  renderTicketsList();
}

function appendToTicket(sessionId, role, text, time) {
  // Найти тикет по session_id
  const tid = Object.keys(tickets).find(k => tickets[k].session_id === sessionId);
  if (!tid) return;
  tickets[tid].messages = tickets[tid].messages || [];
  tickets[tid].messages.push({role, text, time: time || now()});
  if (currentTicket && currentTicket.ticket_id === tid) {
    addSupportMsg(role, text, time);
  }
  renderTicketsList();
}

function renderTicketsList() {
  const el   = document.getElementById('ticketsList');
  const none = document.getElementById('noTickets');
  const keys = Object.keys(tickets);
  if (!keys.length) {
    none.style.display = 'block';
    el.innerHTML = '';
    el.appendChild(none);
    return;
  }
  none.style.display = 'none';
  el.innerHTML = '';
  keys.forEach(tid => {
    const t   = tickets[tid];
    const div = document.createElement('div');
    div.className = `ticket-item${currentTicket?.ticket_id === tid ? ' active' : ''}`;
    div.onclick = () => openTicket(tid);
    const lastQ = (t.questions || []).slice(-1)[0] || '—';
    div.innerHTML = `<div class="ticket-id">${esc(tid)}<span class="ticket-badge">${esc(t.state||'open')}</span></div>
      <div class="ticket-preview">${esc(t.user_name || 'Пользователь')}: ${esc(lastQ)}</div>`;
    el.appendChild(div);
  });
}

function openTicket(tid) {
  currentTicket = tickets[tid];
  renderTicketsList();

  const empty = document.getElementById('supportChatEmpty');
  const msgs  = document.getElementById('supportMessages');
  const area  = document.getElementById('supportInputArea');

  empty.style.display = 'none';
  msgs.style.display  = 'flex';
  area.style.display  = 'flex';
  msgs.innerHTML = '';

  // Показываем историю (нормализуем оба варианта поля)
  const history = currentTicket.messages || currentTicket.chat_history || [];
  if (!history.length) {
    // Если история пустая — показываем вопросы пользователя
    (currentTicket.questions || []).forEach(q => {
      addSupportMsg('user', q, currentTicket.created_at ? new Date(currentTicket.created_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}) : '', false);
    });
  } else {
    history.forEach(m => addSupportMsg(m.role, m.text, m.time, false));
  }
  scrollBottom(msgs);
}

function addSupportMsg(role, text, time, scroll=true) {
  const el  = document.getElementById('supportMessages');
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'bot' : role === 'support' ? 'user' : 'system'}`;
  const label = role === 'user'
    ? `<div class="msg-role">${esc(currentTicket?.user_name||'Пользователь')}</div>`
    : role === 'support' ? '<div class="msg-role">Вы</div>' : '';
  div.innerHTML = `${label}${esc(text).replace(/\n/g,'<br>')}
    <div class="msg-time">${time || now()}</div>`;
  el.appendChild(div);
  if (scroll) scrollBottom(el);
}

async function sendSupportReply() {
  const input = document.getElementById('supportInput');
  const text  = input.value.trim();
  if (!text || !currentTicket) return;
  input.value = '';

  addSupportMsg('support', text);

  try {
    await fetch(`${API}/support/reply`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        ticket_id:  currentTicket.ticket_id,
        session_id: currentTicket.session_id,
        message:    text,
      })
    });
    currentTicket.messages = currentTicket.messages || [];
    currentTicket.messages.push({role:'support', text, time: now()});
  } catch(e) {
    addSupportMsg('system', 'Ошибка отправки');
  }
}

async function closeCurrentTicket() {
  if (!currentTicket) return;
  const tid = currentTicket.ticket_id;
  await fetch(`${API}/support/close/${tid}`, {method:'POST'});
  delete tickets[tid];
  currentTicket = null;
  renderTicketsList();
  document.getElementById('supportChatEmpty').style.display = 'flex';
  document.getElementById('supportMessages').style.display  = 'none';
  document.getElementById('supportInputArea').style.display = 'none';
}

function handleSupportKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendSupportReply();
  }
  setTimeout(() => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 100) + 'px';
  }, 0);
}

function showSupportNotification(t) {
  const lastQ = (t.questions || []).slice(-1)[0] || '—';
  if (Notification.permission === 'granted') {
    new Notification(`Новый тикет ${t.ticket_id}`, { body: lastQ });
  }
}

// ── Старт ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (Notification.permission === 'default') Notification.requestPermission();
  initUserWidget();
});
</script>
</body>
</html>
