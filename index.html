<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSales Support — Демо</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
}

/* Шапка */
.header {
  background: #065A82; color: white;
  padding: 14px 24px; display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.logo {
  width: 34px; height: 34px; background: #1C7293; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700;
}
.header h1 { font-size: 17px; font-weight: 600; }
.header p  { font-size: 12px; opacity: .7; margin-top: 1px; }
.badge {
  margin-left: auto; background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.3);
  padding: 3px 10px; border-radius: 20px; font-size: 12px;
}

/* Сетка */
.grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px; max-width: 1100px; margin: 24px auto; padding: 0 20px;
}
@media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

/* Панель */
.panel {
  background: white; border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  display: flex; flex-direction: column;
  overflow: hidden; height: 620px;
}
.panel-head {
  padding: 13px 16px; font-size: 14px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid #eee; flex-shrink: 0;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
.dot.on { background: #27ae60; }
.lbl {
  font-size: 11px; font-weight: 500; letter-spacing: .5px;
  text-transform: uppercase; opacity: .45; margin-left: auto;
}

/* Сообщения */
.msgs {
  flex: 1; overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 8px;
  min-height: 0;
}
.msg {
  max-width: 84%; padding: 9px 13px; border-radius: 12px;
  font-size: 14px; line-height: 1.5; word-break: break-word;
}
.msg.bot     { background: #f0f4f8; align-self: flex-start; border-bottom-left-radius: 3px; }
.msg.user    { background: #065A82; color: white; align-self: flex-end; border-bottom-right-radius: 3px; }
.msg.support { background: #e8f8ef; border: 1px solid #b8e6cc; align-self: flex-start; border-bottom-left-radius: 3px; }
.msg.system  { background: #fff8e6; color: #7a5c00; font-size: 12px; padding: 7px 12px; border-radius: 8px; align-self: center; text-align: center; max-width: 92%; }
.msg-role    { font-size: 11px; font-weight: 600; opacity: .55; margin-bottom: 3px; }
.msg-time    { font-size: 11px; opacity: .45; margin-top: 3px; }

/* Кнопки фидбека */
.fbbtns { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.fbbtn  {
  padding: 6px 13px; border-radius: 8px; border: 1px solid;
  cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s;
  background: white;
}
.fbbtn.yes { border-color: #27ae60; color: #27ae60; }
.fbbtn.yes:hover { background: #27ae60; color: white; }
.fbbtn.no  { border-color: #e74c3c; color: #e74c3c; }
.fbbtn.no:hover  { background: #e74c3c; color: white; }
.fbbtn.close { border-color: #888; color: #666; }
.fbbtn.close:hover { background: #eee; }

/* Источник */
.src { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 8px; margin-top: 3px; }
.src.keyword { background: #e8f8ef; color: #27ae60; }
.src.ai      { background: #e8f0fe; color: #065A82; }

/* Ввод */
.input-area {
  padding: 10px 14px; border-top: 1px solid #eee;
  display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
}
.chat-input {
  flex: 1; border: 1px solid #dde3ea; border-radius: 10px;
  padding: 9px 13px; font-size: 14px; resize: none;
  font-family: inherit; outline: none; max-height: 100px; transition: border-color .15s;
}
.chat-input:focus { border-color: #065A82; }
.chat-input:disabled { background: #f5f5f5; }
.send-btn {
  background: #065A82; color: white; border: none; border-radius: 10px;
  padding: 9px 15px; cursor: pointer; font-size: 14px; font-weight: 600;
  transition: background .15s; white-space: nowrap;
}
.send-btn:hover { background: #1C7293; }
.send-btn:disabled { background: #aaa; cursor: not-allowed; }

/* ═══ ПАНЕЛЬ ПОДДЕРЖКИ ═══ */

/* Логин */
.login-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px; padding: 24px;
}
.login-wrap p { font-size: 14px; color: #666; text-align: center; }
.login-input {
  width: 100%; border: 1px solid #dde3ea; border-radius: 10px;
  padding: 9px 13px; font-size: 14px; outline: none;
}
.login-input:focus { border-color: #065A82; }
.login-btn {
  width: 100%; background: #065A82; color: white;
  border: none; border-radius: 10px; padding: 10px;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.login-err { color: #e74c3c; font-size: 13px; min-height: 18px; }

/* Основная панель после входа */
.sup-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

/* Список тикетов */
.tickets-bar {
  border-bottom: 1px solid #eee; flex-shrink: 0;
  max-height: 160px; overflow-y: auto;
}
.t-item {
  padding: 8px 12px; cursor: pointer; font-size: 13px;
  border-bottom: 1px solid #f0f0f0; transition: background .1s;
  display: flex; align-items: flex-start; gap: 8px;
}
.t-item:hover { background: #f7f9fc; }
.t-item.active { background: #e8f0fe; }
.t-left { flex: 1; min-width: 0; }
.t-id   { font-weight: 700; font-size: 12px; color: #065A82; }
.t-prev { color: #777; font-size: 12px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.t-badge {
  font-size: 10px; padding: 2px 7px; border-radius: 10px;
  white-space: nowrap; flex-shrink: 0; align-self: center;
}
.t-badge.waiting  { background: #fdecea; color: #c0392b; }
.t-badge.replied  { background: #e8f8ef; color: #1e8449; }
.t-badge.resolved { background: #eee;    color: #888; }
.t-badge.new { background: #fff3cd; color: #856404; animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
.no-t { text-align: center; color: #bbb; font-size: 13px; padding: 18px; font-style: italic; }

/* Чат поддержки */
.sup-chat { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.sup-empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: #bbb; font-size: 14px; font-style: italic;
}
.sup-msgs { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; min-height: 0; }
.sup-input-area {
  padding: 10px 12px; border-top: 1px solid #eee;
  display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
}
.close-btn {
  background: #27ae60; color: white; border: none;
  border-radius: 8px; padding: 7px 13px; font-size: 13px;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.close-btn:hover { background: #219a52; }
.close-btn:disabled { background: #aaa; cursor: not-allowed; }

/* Статус тикета в заголовке чата поддержки */
.sup-ticket-head {
  padding: 8px 12px; background: #f7f9fc;
  border-bottom: 1px solid #eee; font-size: 12px; color: #555;
  flex-shrink: 0; display: flex; align-items: center; gap: 8px;
}
.sup-ticket-head strong { color: #065A82; }
.status-label {
  font-size: 11px; padding: 2px 7px; border-radius: 8px; margin-left: auto;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">iS</div>
  <div>
    <h1>iSales Support</h1>
    <p>Демо-страница виджета поддержки</p>
  </div>
  <span class="badge">Demo</span>
</div>

<div class="grid">

  <!-- ═══ ВИДЖЕТ ПОЛЬЗОВАТЕЛЯ ═══ -->
  <div class="panel">
    <div class="panel-head">
      <div class="dot on"></div>
      <span>Чат с поддержкой</span>
      <span class="lbl">Пользователь</span>
    </div>
    <div class="msgs" id="uMsgs"></div>
    <div class="input-area">
      <textarea class="chat-input" id="uInput" placeholder="Напишите вопрос..." rows="1"
        onkeydown="onUserKey(event)"></textarea>
      <button class="send-btn" id="uBtn" onclick="sendUser()">Отправить</button>
    </div>
  </div>

  <!-- ═══ ПАНЕЛЬ ПОДДЕРЖКИ ═══ -->
  <div class="panel">
    <div class="panel-head">
      <div class="dot" id="sDot"></div>
      <span>Панель поддержки</span>
      <span class="lbl">Специалист</span>
    </div>

    <!-- Логин -->
    <div class="login-wrap" id="sLogin">
      <p>Войдите как специалист поддержки</p>
      <input class="login-input" type="password" id="sPwd"
        placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" onclick="doLogin()">Войти</button>
      <span class="login-err" id="sErr"></span>
    </div>

    <!-- Панель после входа -->
    <div class="sup-main" id="sMain" style="display:none">
      <!-- Список тикетов -->
      <div class="tickets-bar" id="tBar">
        <div class="no-t" id="noT">Нет открытых тикетов</div>
      </div>
      <!-- Чат -->
      <div class="sup-chat">
        <div class="sup-empty" id="sEmpty">Выберите тикет</div>
        <div id="sTicketHead" style="display:none" class="sup-ticket-head">
          <span>Тикет <strong id="sHeadId"></strong></span>
          <span>Пользователь: <strong id="sHeadUser"></strong></span>
          <span class="status-label t-badge" id="sHeadStatus"></span>
        </div>
        <div class="sup-msgs" id="sMsgs" style="display:none"></div>
        <div class="sup-input-area" id="sInputArea" style="display:none">
          <button class="close-btn" id="sCloseBtn" onclick="closeTicket()">Закрыть тикет</button>
          <textarea class="chat-input" id="sInput" placeholder="Ответ пользователю..." rows="1"
            onkeydown="onSupKey(event)"></textarea>
          <button class="send-btn" id="sBtn" onclick="sendSupport()">Ответить</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════════════
// КОНФИГ — замените на ваш Railway URL
// ══════════════════════════════════════════════════════════════
const API = (window.BACKEND_URL || 'https://isales-bot-production.up.railway.app').replace(/\/$/, '');
const WSB = API.replace(/^https/, 'wss').replace(/^http/, 'ws');

// ══════════════════════════════════════════════════════════════
// УТИЛИТЫ
// ══════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const esc = t => String(t ?? '')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const hm = () => new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
const scrollBot = el => { el.scrollTop = el.scrollHeight; };

// ══════════════════════════════════════════════════════════════
// СОСТОЯНИЕ ПОЛЬЗОВАТЕЛЯ
// ══════════════════════════════════════════════════════════════
let uSid = null;      // session_id пользователя
let uWs  = null;      // WebSocket пользователя
let uTicketId  = null; // текущий ticket_id
let uResolved  = false; // пользователь уже подтвердил

// ══════════════════════════════════════════════════════════════
// СОСТОЯНИЕ ПОДДЕРЖКИ
// ══════════════════════════════════════════════════════════════
let sWs         = null;
let activeTid   = null;             // активный тикет в панели
const tickets   = {};               // { tid: {ticket_id,session_id,user_name,questions,state,messages[]} }

// ══════════════════════════════════════════════════════════════
// ПОЛЬЗОВАТЕЛЬ — ИНИЦИАЛИЗАЦИЯ
// ══════════════════════════════════════════════════════════════

async function initUser() {
  try {
    const r = await fetch(API + '/widget/session', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({user_name: 'Пользователь'})
    });
    const d = await r.json();
    uSid = d.session_id;
    uAppend('bot', d.greeting);
    uConnectWs();
  } catch(e) {
    uAppend('system', 'Не удалось подключиться. Проверьте URL в конфиге.');
    console.error('initUser:', e);
  }
}

function uConnectWs() {
  if (!uSid) return;
  uWs = new WebSocket(WSB + '/ws/user/' + uSid);
  uWs.onopen  = () => console.log('User WS ok');
  uWs.onclose = () => setTimeout(uConnectWs, 3000);
  uWs.onerror = e => console.warn('User WS err', e);
  uWs.onmessage = e => {
    try {
      const ev = JSON.parse(e.data);
      console.log('User WS:', ev.type, ev);
      if (ev.type === 'support_reply') {
        uAppend('support', ev.text, ev.time, 'Специалист поддержки');
        uShowFeedback(ev.ticket_id, false); // ещё раз показываем кнопки
      } else if (ev.type === 'ticket_closed') {
        uAppend('system', ev.text || 'Тикет закрыт.');
        uSetResolved();
      }
    } catch(err) { console.error('User WS parse:', err); }
  };
}

// ── Добавить сообщение в чат пользователя ──
function uAppend(role, text, time, roleLabel) {
  const box = $('uMsgs');
  const d   = document.createElement('div');
  d.className = 'msg ' + role;
  const rl = roleLabel ? '<div class="msg-role">' + esc(roleLabel) + '</div>' : '';
  d.innerHTML = rl + esc(text).replace(/\n/g,'<br>')
    + '<div class="msg-time">' + (time || hm()) + '</div>';
  box.appendChild(d);
  scrollBot(box);
  return d;
}

// ── Показать кнопки фидбека ──
function uShowFeedback(ticketId, isBot) {
  // Удаляем старые кнопки фидбека если есть
  const old = $('fb_' + ticketId);
  if (old) old.remove();

  const box = $('uMsgs');
  const d   = document.createElement('div');
  d.className = 'msg bot';
  d.id = 'fb_' + ticketId;

  if (isBot) {
    // Ответ от бота — кнопки: Помогло / Не помогло / Закрыть
    d.innerHTML = 'Помогло?'
      + '<div class="fbbtns">'
      + '<button class="fbbtn yes" onclick="uFeedback(\'' + ticketId + '\',true)">✅ Да, решено</button>'
      + '<button class="fbbtn no"  onclick="uFeedback(\'' + ticketId + '\',false)">❌ Не помогло</button>'
      + '<button class="fbbtn close" onclick="uClose(\'' + ticketId + '\')">✖ Закрыть</button>'
      + '</div>';
  } else {
    // Ответ от специалиста — кнопки: Решено / Нужна ещё помощь / Закрыть
    d.innerHTML = 'Вопрос решён?'
      + '<div class="fbbtns">'
      + '<button class="fbbtn yes" onclick="uFeedback(\'' + ticketId + '\',true)">✅ Да, решено</button>'
      + '<button class="fbbtn no"  onclick="uFeedback(\'' + ticketId + '\',false)">❌ Нужна помощь</button>'
      + '<button class="fbbtn close" onclick="uClose(\'' + ticketId + '\')">✖ Закрыть</button>'
      + '</div>';
  }
  box.appendChild(d);
  scrollBot(box);
}

async function uFeedback(ticketId, resolved) {
  const fb = $('fb_' + ticketId);
  if (fb) fb.remove();
  try {
    const r = await fetch(API + '/widget/feedback', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({session_id: uSid, ticket_id: ticketId, resolved})
    });
    const d = await r.json();
    uAppend('bot', d.reply);
    if (resolved) {
      uSetResolved();
    }
    // Если rejected — ждём ответа специалиста, ввод не блокируем
  } catch(e) {
    uAppend('system', 'Ошибка. Попробуйте ещё раз.');
  }
}

async function uClose(ticketId) {
  const fb = $('fb_' + ticketId);
  if (fb) fb.remove();
  try {
    await fetch(API + '/widget/close', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({session_id: uSid, ticket_id: ticketId})
    });
    uAppend('system', 'Тикет закрыт. Если нужна помощь — напишите снова.');
    uSetIdle();
  } catch(e) {
    uAppend('system', 'Ошибка закрытия.');
  }
}

function uSetResolved() {
  uResolved = true;
  uTicketId = null;
  $('uInput').disabled = false;
  $('uBtn').disabled   = false;
}

function uSetIdle() {
  uResolved = false;
  uTicketId = null;
  $('uInput').disabled = false;
  $('uBtn').disabled   = false;
}

// ── Отправить сообщение ──
async function sendUser() {
  const inp  = $('uInput');
  const btn  = $('uBtn');
  const text = inp.value.trim();
  if (!text || !uSid) return;

  inp.value = '';
  inp.style.height = 'auto';
  btn.disabled = true;
  uAppend('user', text);

  try {
    const r = await fetch(API + '/widget/message', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({session_id: uSid, message: text, user_name: 'Пользователь'})
    });
    if (!r.ok) {
      uAppend('system', 'Ошибка сервера: ' + r.status);
      return;
    }
    const d = await r.json();
    const msgEl = uAppend('bot', d.reply);

    // Значок источника
    if (d.source && d.source !== 'none') {
      const badge = document.createElement('div');
      badge.className = 'src ' + d.source;
      badge.textContent = d.source === 'ai' ? 'AI' : 'База знаний';
      msgEl.appendChild(badge);
    }

    uTicketId = d.ticket_id || uTicketId;

    if (d.show_feedback && d.ticket_id) {
      uShowFeedback(d.ticket_id, true);
    }

    // Если эскалировали к специалисту — показываем кнопку закрыть
    if (d.state === 'waiting_support') {
      const box = $('uMsgs');
      const cl  = document.createElement('div');
      cl.className = 'msg bot';
      cl.id = 'closebtn_' + d.ticket_id;
      cl.innerHTML = '<div class="fbbtns"><button class="fbbtn close" onclick="uClose(\'' + d.ticket_id + '\')">✖ Закрыть тикет</button></div>';
      box.appendChild(cl);
      scrollBot(box);
    }
  } catch(e) {
    uAppend('system', 'Нет соединения. Попробуйте ещё раз.');
    console.error('sendUser:', e);
  } finally {
    btn.disabled = false;
    inp.focus();
  }
}

function onUserKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendUser(); }
  setTimeout(() => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 100) + 'px';
  }, 0);
}

// ══════════════════════════════════════════════════════════════
// ПОДДЕРЖКА — ЛОГИН
// ══════════════════════════════════════════════════════════════

async function doLogin() {
  const pwd = $('sPwd').value.trim();
  const err = $('sErr');
  err.textContent = '';
  if (!pwd) { err.textContent = 'Введите пароль'; return; }
  try {
    const r = await fetch(API + '/support/auth', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pwd})
    });
    if (r.ok) {
      $('sLogin').style.display = 'none';
      $('sMain').style.display  = 'flex';
      $('sDot').classList.add('on');
      sConnectWs();
      sLoadTickets();
    } else {
      const d = await r.json().catch(() => ({}));
      err.textContent = d.error || 'Неверный пароль';
    }
  } catch(e) {
    err.textContent = 'Ошибка соединения';
    console.error('doLogin:', e);
  }
}

// ══════════════════════════════════════════════════════════════
// ПОДДЕРЖКА — WEBSOCKET
// ══════════════════════════════════════════════════════════════

function sConnectWs() {
  sWs = new WebSocket(WSB + '/ws/support');
  sWs.onopen  = () => console.log('Support WS ok');
  sWs.onclose = () => setTimeout(sConnectWs, 3000);
  sWs.onerror = e => console.warn('Support WS err', e);
  sWs.onmessage = e => {
    try {
      const ev = JSON.parse(e.data);
      console.log('Support WS:', ev.type, ev);

      if (ev.type === 'init') {
        (ev.tickets || []).forEach(sSaveTicket);
        sRender();

      } else if (ev.type === 'new_ticket') {
        sSaveTicket(ev);
        sRender();
        sNotify('Новый тикет ' + ev.ticket_id);

      } else if (ev.type === 'answer_rejected') {
        // Пользователь отклонил ответ
        const tid = ev.ticket_id;
        if (tickets[tid]) {
          tickets[tid].state = 'waiting_support';
          // Добавляем системное сообщение в историю тикета
          tickets[tid].messages = tickets[tid].messages || [];
          tickets[tid].messages.push({role:'system', text: ev.message, time: hm()});
          if (activeTid === tid) {
            sAddMsg('system', ev.message);
          }
          sRender();
        }
        sNotify('❌ ' + (ev.user_name||'Пользователь') + ' отклонил ответ — ' + ev.ticket_id);

      } else if (ev.type === 'ticket_resolved') {
        // Пользователь подтвердил
        const tid = ev.ticket_id;
        if (tickets[tid]) {
          tickets[tid].state = 'resolved';
          tickets[tid].messages = tickets[tid].messages || [];
          tickets[tid].messages.push({role:'system', text: ev.message, time: hm()});
          if (activeTid === tid) {
            sAddMsg('system', ev.message);
            sUpdateHead(tid);
            // Блокируем ввод, оставляем только "Закрыть тикет"
            $('sInput').disabled = true;
            $('sBtn').disabled   = true;
          }
          sRender();
        }
        sNotify('✅ ' + ev.ticket_id + ' — пользователь подтвердил решение');

      } else if (ev.type === 'ticket_closed') {
        // Тикет закрыт (нами или пользователем)
        const tid = ev.ticket_id;
        if (tickets[tid]) {
          delete tickets[tid];
        }
        if (activeTid === tid) {
          activeTid = null;
          sShowEmpty();
        }
        sRender();

      } else if (ev.type === 'ticket_closed_by_user') {
        const tid = ev.ticket_id;
        if (tickets[tid]) {
          tickets[tid].messages = tickets[tid].messages || [];
          tickets[tid].messages.push({role:'system', text: '🚫 Пользователь закрыл тикет', time: hm()});
          tickets[tid].state = 'closed';
        }
        delete tickets[tid]; // убираем из обработки
        if (activeTid === tid) {
          activeTid = null;
          sShowEmpty();
        }
        sRender();
        sNotify('🚫 Пользователь закрыл тикет ' + tid);

      } else if (ev.type === 'user_message') {
        // Новое сообщение от пользователя в активный тикет
        const tid = findTidBySid(ev.session_id);
        if (tid) {
          tickets[tid].messages = tickets[tid].messages || [];
          tickets[tid].messages.push({role:'user', text: ev.text, time: ev.time || hm()});
          if (activeTid === tid) {
            sAddMsg('user', ev.text, ev.time, tickets[tid].user_name);
          }
        }
      }
    } catch(err) { console.error('Support WS parse:', err); }
  };
}

// ══════════════════════════════════════════════════════════════
// ПОДДЕРЖКА — ТИКЕТЫ
// ══════════════════════════════════════════════════════════════

function sSaveTicket(t) {
  if (!t || !t.ticket_id) return;
  const tid = t.ticket_id;
  const msgs = t.messages || t.chat_history || [];
  tickets[tid] = {
    ticket_id:  tid,
    session_id: t.session_id || '',
    user_name:  t.user_name  || 'Пользователь',
    questions:  t.questions  || [],
    state:      t.state      || 'waiting_support',
    created_at: t.created_at || '',
    messages:   msgs,
  };
}

function findTidBySid(sid) {
  return Object.keys(tickets).find(k => tickets[k].session_id === sid) || null;
}

async function sLoadTickets() {
  try {
    const r = await fetch(API + '/support/tickets');
    const d = await r.json();
    (d.tickets || []).forEach(sSaveTicket);
    sRender();
  } catch(e) { console.error('loadTickets:', e); }
}

function sRender() {
  const bar  = $('tBar');
  const keys = Object.keys(tickets);
  bar.innerHTML = '';

  if (!keys.length) {
    bar.innerHTML = '<div class="no-t">Нет открытых тикетов</div>';
    return;
  }

  keys.forEach(tid => {
    const t   = tickets[tid];
    const div = document.createElement('div');
    div.className = 'ticket-item t-item' + (activeTid === tid ? ' active' : '');
    div.addEventListener('click', () => sOpenTicket(tid));

    // Бейдж статуса
    const stateMap = {
      waiting_support: ['waiting',  'Ожидает'],
      support_replied: ['replied',  'Отвечено'],
      resolved:        ['resolved', 'Решено'],
    };
    const [cls, label] = stateMap[t.state] || ['waiting','Новый'];

    const lastQ = (t.questions || []).slice(-1)[0] || '—';
    div.innerHTML =
      '<div class="t-left">'
      + '<div class="t-id">' + esc(tid) + '</div>'
      + '<div class="t-prev">' + esc(t.user_name) + ': ' + esc(lastQ) + '</div>'
      + '</div>'
      + '<span class="t-badge ' + cls + '">' + label + '</span>';
    bar.appendChild(div);
  });
}

function sOpenTicket(tid) {
  const t = tickets[tid];
  if (!t) return;
  activeTid = tid;
  sRender();

  // Заголовок чата
  $('sTicketHead').style.display = 'flex';
  $('sHeadId').textContent   = tid;
  $('sHeadUser').textContent = t.user_name;
  sUpdateHead(tid);

  // Показываем чат
  $('sEmpty').style.display     = 'none';
  $('sMsgs').style.display      = 'flex';
  $('sInputArea').style.display = 'flex';

  // Рисуем историю
  const msgs = $('sMsgs');
  msgs.innerHTML = '';

  const history = t.messages || [];
  if (!history.length) {
    // Показываем вопросы пользователя
    (t.questions || []).forEach(q => sAddMsg('user', q, '', t.user_name, false));
    if (!t.questions || !t.questions.length) {
      sAddMsg('system', 'История переписки недоступна.', '', '', false);
    }
  } else {
    history.forEach(m => sAddMsg(m.role, m.text, m.time, t.user_name, false));
  }
  scrollBot(msgs);

  // Блокировка ввода если тикет решён
  const resolved = t.state === 'resolved';
  $('sInput').disabled = resolved;
  $('sBtn').disabled   = resolved;
  $('sInput').focus();
}

function sUpdateHead(tid) {
  const t = tickets[tid];
  if (!t) return;
  const stateMap = {
    waiting_support: ['waiting',  'Ожидает ответа'],
    support_replied: ['replied',  'Отвечено'],
    resolved:        ['resolved', 'Решено пользователем'],
  };
  const [cls, label] = stateMap[t.state] || ['waiting','Открыт'];
  const el = $('sHeadStatus');
  el.className = 'status-label t-badge ' + cls;
  el.textContent = label;
}

function sShowEmpty() {
  $('sEmpty').style.display     = 'flex';
  $('sMsgs').style.display      = 'none';
  $('sInputArea').style.display = 'none';
  $('sTicketHead').style.display = 'none';
  $('sMsgs').innerHTML = '';
}

// ── Добавить сообщение в чат поддержки ──
function sAddMsg(role, text, time, userName, doScroll) {
  if (doScroll === undefined) doScroll = true;
  const msgs = $('sMsgs');
  if (!msgs || msgs.style.display === 'none') return;
  const d = document.createElement('div');
  // user (пользователь) → слева как "bot"
  // support (специалист) → справа как "user"
  d.className = 'msg ' + (role==='support' ? 'user' : role==='user' ? 'bot' : 'system');
  const rl = role === 'user'
    ? '<div class="msg-role">' + esc(userName || 'Пользователь') + '</div>'
    : role === 'support'
      ? '<div class="msg-role">Вы</div>'
      : '';
  d.innerHTML = rl + esc(text).replace(/\n/g,'<br>')
    + '<div class="msg-time">' + (time || hm()) + '</div>';
  msgs.appendChild(d);
  if (doScroll) scrollBot(msgs);
}

// ── Отправить ответ ──
async function sendSupport() {
  const inp  = $('sInput');
  const text = inp.value.trim();
  if (!text || !activeTid) return;

  const t = tickets[activeTid];
  if (!t) return;

  inp.value = '';
  sAddMsg('support', text);

  try {
    const r = await fetch(API + '/support/reply', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ticket_id: activeTid, session_id: t.session_id, message: text})
    });
    if (!r.ok) {
      sAddMsg('system', 'Ошибка отправки: ' + r.status);
      return;
    }
    t.messages = t.messages || [];
    t.messages.push({role:'support', text, time: hm()});
    t.state = 'support_replied';
    sRender();
    sUpdateHead(activeTid);
  } catch(e) {
    sAddMsg('system', 'Нет соединения.');
    console.error('sendSupport:', e);
  }
}

async function closeTicket() {
  if (!activeTid) return;
  const tid = activeTid;
  try {
    await fetch(API + '/support/close/' + tid, {method:'POST'});
    // WS событие ticket_closed придёт и уберёт тикет
  } catch(e) {
    console.error('closeTicket:', e);
  }
}

function onSupKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendSupport(); }
  setTimeout(() => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 100) + 'px';
  }, 0);
}

function sNotify(msg) {
  if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
    new Notification('iSales Support', {body: msg, icon: ''});
  }
  console.log('Support notify:', msg);
}

// ══════════════════════════════════════════════════════════════
// СТАРТ
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  initUser();
});
</script>
